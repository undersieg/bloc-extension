name: bloc_devtools_extension
description: >-
  Time-travel dev tools for flutter_bloc, inspired by Redux DevTools.
  Provides an in-app debugging panel and a Flutter DevTools browser extension
  with state history, BLoC connection graph, performance metrics, state diff,
  event timeline, and state replay.
version: 0.1.0
repository: https://github.com/undersieg/bloc-devtools-extension
issue_tracker: https://github.com/undersieg/bloc-devtools-extension/issues

topics:
  - bloc
  - devtools
  - debugging
  - state-management
  - developer-tools

platforms:
  android:
  ios:
  linux:
  macos:
  web:
  windows:

environment:
  sdk: ">=3.2.0 <4.0.0"
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter
  bloc: ">=8.1.0 <10.0.0"
  flutter_bloc: ">=8.1.0 <10.0.0"

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

false_secrets:
  - /extension/devtools/build/**